# ============================================================
# 文颜彩虹主题 (Wenyan Rainbow)
# ============================================================
# 特点：色彩丰富但不刺眼，布局简洁，适合多元化内容
# 适用：综合、多元、创意、艺术、设计类文章
# 风格：丰富、生动、多彩、创意
# 来源：文颜(Wenyan)内置主题移植
# ============================================================

name: 文颜彩虹
description: 色彩丰富但不刺眼，布局简洁，适合多元化内容创作
keywords:
  - 彩虹
  - 多彩
  - 创意
  - 艺术
  - 设计
  - 综合
  - 多元
  - 生动
  - 丰富
  - 靛蓝

colors:
  primary: "#6366f1"      # 主色调：靛蓝紫
  accent: "#e0e7ff"        # 强调色：浅靛蓝背景
  text: "#1e1b4b"          # 主文字：深靛蓝
  text_light: "#6366f1"    # 次要文字：靛蓝
  background: "#ffffff"    # 背景色：纯白
  blockquote_bg: "#f5f3ff" # 引用块背景：极浅紫
  code_bg: "#f5f3ff"       # 代码背景：极浅紫
  table_border: "#c7d2fe"  # 表格边框：浅靛蓝
  table_header_bg: "#e0e7ff" # 表头背景：浅靛蓝

styles:
  body:
    font_size: "16px"
    line_height: "1.75"
    letter_spacing: "0px"
    padding: "0 16px"
    margin: "0 0 10px 0"
    color: "#1e1b4b"
    background_color: "#ffffff"
  h1:
    font_size: "24px"
    font_weight: "normal"
    margin: "0 0 8px 0"
    padding: "0 16px"
    text_align: "center"
    color: "#4f46e5"
  h2:
    font_size: "20.8px"
    font_weight: "bold"
    margin: "0 0 6px 0"
    padding: "0 16px"
    color: "#1e1b4b"
  h3:
    font_size: "20.8px"
    font_weight: "bold"
    margin: "0 0 4px 0"
    padding: "0 16px"
    color: "#4f46e5"
  h4:
    font_size: "19.2px"
    font_weight: "bold"
    margin: "0 0 4px 0"
    padding: "0 16px"
    color: "#6366f1"
  blockquote:
    font_size: "14.4px"
    padding: "8px 10px"
    margin: "16px 0"
    border_left: "4px solid #8b5cf6"
    background: "#f5f3ff"
    border_radius: "0 5px 5px 0"
    line_height: "1.75"
    color: "#312e81"
  code_inline:
    font_size: "12.5px"
    padding: "4px 6px"
    border_radius: "3px"
    background: "#ede9fe"
    color: "#7c3aed"
  code_block:
    font_size: "14px"
    line_height: "2"
    margin: "10px 4px"
    padding: "8px"
    border_radius: "5px"
    background: "#f5f3ff"
    color: "#1e1b4b"
  list:
    font_size: "16px"
    margin: "10px 0"
    padding: "0 16px 0 32px"
    line_height: "1.75"
    color: "#1e1b4b"
  separator:
    border_top: "1px solid #ddd"
    margin: "20px auto"
  image:
    border_radius: "8px"
    box_shadow: "0 2px 8px rgba(0, 0, 0, 0.08)"
  link:
    color: "#4f46e5"
    text_decoration: "underline"
  strong:
    font_weight: "bold"
    color: "#7c3aed"
  table:
    font_size: "12px"
    border_collapse: "collapse"
    width: "100%"
    margin: "10px 0"
  table_th:
    padding: "9px 12px"
    line_height: "22px"
    font_weight: "bold"
    background: "#e0e7ff"
    color: "#1e1b4b"
    border: "1px solid #c7d2fe"
  table_td:
    padding: "9px 12px"
    line_height: "22px"
    color: "#312e81"
    border: "1px solid #c7d2fe"
  module_title:
    font_size: "20.8px"
    font_weight: "bold"
    color: "#4f46e5"
    margin: "0 0 6px 0"
    padding: "0 16px"
    text_align: "center"